<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTHH — Control de Acceso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #b78c33;
        --gold-light: #d4aa55;
        --gold-pale: #f5edd8;
        --gold-glow: rgba(183, 140, 51, 0.15);
        --dark: #0f0f0f;
        --ink: #2e2e2e;
        --gray: #6b6b6b;
        --gray-light: #9a9a9a;
        --border: #e4ddd0;
        --cream: #f7f4ee;
        --white: #ffffff;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "DM Sans", sans-serif;
        --tr: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font-body);
        background: var(--cream);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 85%,
            rgba(183, 140, 51, 0.06) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 85% 15%,
            rgba(183, 140, 51, 0.05) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      .login-card {
        position: relative;
        background: var(--white);
        width: 100%;
        max-width: 420px;
        padding: 2.8rem 2.8rem 2.4rem;
        border: 1px solid var(--border);
        box-shadow: 0 4px 40px rgba(0, 0, 0, 0.07);
        animation: fadeUp 0.55s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      .login-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--gold),
          var(--gold-light),
          var(--gold)
        );
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-header {
        text-align: center;
        margin-bottom: 2.2rem;
      }

      .user-icon-wrap {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--dark);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.4rem;
        position: relative;
      }
      .user-icon-wrap::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 1.5px solid rgba(183, 140, 51, 0.45);
      }
      .user-icon-wrap svg {
        color: var(--gold);
      }

      .card-label {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--gold);
        display: block;
        margin-bottom: 0.45rem;
      }
      .card-title {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--dark);
        line-height: 1.15;
        margin-bottom: 0.35rem;
      }
      .card-sub {
        font-size: 0.81rem;
        color: var(--gray);
        font-weight: 300;
        line-height: 1.6;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .field-label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        margin-bottom: 0.5rem;
      }

      .input-wrap,
      .select-wrap {
        position: relative;
      }

      .field-input,
      .field-select {
        width: 100%;
        padding: 0.78rem 1rem 0.78rem 2.5rem;
        background: var(--cream);
        border: 1.5px solid var(--border);
        border-radius: 3px;
        font-family: var(--font-body);
        font-size: 0.875rem;
        color: var(--ink);
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        transition:
          border-color var(--tr),
          box-shadow var(--tr),
          background var(--tr);
      }
      .field-input::placeholder {
        color: var(--gray-light);
        font-weight: 300;
      }
      .field-input:focus,
      .field-select:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px var(--gold-glow);
        background: var(--white);
      }

      .field-icon {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray-light);
        pointer-events: none;
        transition: color var(--tr);
      }
      .input-wrap:focus-within .field-icon,
      .select-wrap:focus-within .field-icon {
        color: var(--gold);
      }

      .select-wrap .field-select {
        padding-right: 2.2rem;
      }
      .select-caret {
        position: absolute;
        right: 0.8rem;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--gray-light);
        transition: color var(--tr);
      }
      .select-wrap:focus-within .select-caret {
        color: var(--gold);
      }

      .toggle-pw {
        position: absolute;
        right: 0.8rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray-light);
        padding: 0;
        display: flex;
        transition: color var(--tr);
      }
      .toggle-pw:hover {
        color: var(--gold);
      }

      .role-hint {
        font-size: 0.68rem;
        color: var(--gold);
        margin-top: 0.4rem;
        font-weight: 500;
        min-height: 0.9em;
        opacity: 0;
        transition: opacity var(--tr);
      }
      .role-hint.visible {
        opacity: 1;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0.25rem 0 1.25rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider span {
        font-size: 0.62rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--gray-light);
        white-space: nowrap;
      }

      .btn-accesar {
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.85rem;
        background: var(--dark);
        color: #fff;
        border: none;
        border-radius: 3px;
        font-family: var(--font-body);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        position: relative;
        overflow: hidden;
        transition:
          background var(--tr),
          box-shadow var(--tr),
          transform var(--tr);
      }
      .btn-accesar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(183, 140, 51, 0.15),
          transparent
        );
        transform: translateX(-100%);
        transition: transform 0.55s ease;
      }
      .btn-accesar:hover::before {
        transform: translateX(100%);
      }
      .btn-accesar:hover {
        background: #1a1a1a;
        box-shadow:
          0 6px 22px rgba(0, 0, 0, 0.18),
          0 0 0 1px rgba(183, 140, 51, 0.25);
      }
      .btn-accesar:active {
        transform: scale(0.98);
      }

      .back-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        margin-top: 1.35rem;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--gray-light);
        text-decoration: none;
        transition: color var(--tr);
      }
      .back-link:hover {
        color: var(--gold);
      }
      .back-link svg {
        transition: transform var(--tr);
      }
      .back-link:hover svg {
        transform: translateX(-3px);
      }

      .card-footer-note {
        margin-top: 1.8rem;
        padding-top: 1.4rem;
        border-top: 1px solid var(--border);
        font-size: 0.7rem;
        color: var(--gray-light);
        text-align: center;
        line-height: 1.65;
      }
      .card-footer-note a {
        color: var(--gold);
        text-decoration: none;
      }
      .card-footer-note a:hover {
        color: var(--dark);
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25%,
        75% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="card-header">
        <div class="user-icon-wrap">
          <svg
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <span class="card-label">Sistema Institucional</span>
        <h1 class="card-title">Control de Acceso</h1>
        <p class="card-sub">Selecciona tu rol e ingresa tus credenciales.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="field-label" for="role">Tipo de usuario</label>
          <div class="select-wrap">
            <svg
              class="field-icon"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
            </svg>
            <select class="field-select" id="role" required>
              <option value="" disabled selected>— Seleccionar rol —</option>
              <option value="direccion">Dirección Académica</option>
              <option value="externo">Externo</option>
              <option value="admin">Administrador</option>
              <option value="lider">Líder del Cuerpo Académico</option>
              <option value="director">Director del Programa</option>
            </select>
            <svg
              class="select-caret"
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </div>
          <p class="role-hint" id="roleHint"></p>
        </div>

        <div class="divider"><span>Credenciales</span></div>

        <div class="form-group">
          <label class="field-label" for="usuario">Usuario</label>
          <div class="input-wrap">
            <svg
              class="field-icon"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input
              class="field-input"
              type="text"
              id="usuario"
              placeholder="Ingresa tu usuario"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="field-label" for="contrasena">Contraseña</label>
          <div class="input-wrap">
            <svg
              class="field-icon"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input
              class="field-input"
              type="password"
              id="contrasena"
              placeholder="••••••••"
              autocomplete="current-password"
              style="padding-right: 2.5rem"
              required
            />
            <button
              type="button"
              class="toggle-pw"
              id="togglePw"
              aria-label="Mostrar contraseña"
            >
              <svg
                id="eyeIcon"
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-accesar" id="submitBtn">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          Accesar
        </button>

        <a href="index.html" class="back-link">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <polyline points="15 18 9 12 15 6" />
          </svg>
          Volver al inicio
        </a>
      </form>

      <div class="card-footer-note">
        ¿Problemas para acceder?&nbsp;
        <a href="mailto:rectoria@uthh.edu.mx">rectoria@uthh.edu.mx</a>
        &nbsp;·&nbsp; 789 896 2088
      </div>
    </div>

    <script>
      const hints = {
        direccion: "Gestión académica institucional.",
        externo: "Acceso a recursos de divulgación pública.",
        admin: "Administración total del sistema.",
        lider: "Gestión del cuerpo académico y publicaciones.",
        director: "Supervisión de programas y reportes.",
      };

      document.getElementById("role").addEventListener("change", function () {
        const hint = document.getElementById("roleHint");
        hint.textContent = hints[this.value] || "";
        hint.classList.toggle("visible", !!this.value);
      });

      document
        .getElementById("togglePw")
        .addEventListener("click", function () {
          const pw = document.getElementById("contrasena");
          const icon = document.getElementById("eyeIcon");
          const show = pw.type === "password";
          pw.type = show ? "text" : "password";
          icon.innerHTML = show
            ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
             <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
             <line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
             <circle cx="12" cy="12" r="3"/>`;
        });

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const role = document.getElementById("role").value;
          const user = document.getElementById("usuario").value.trim();
          const pw = document.getElementById("contrasena").value;
          const checks = [
            { el: document.getElementById("role"), empty: !role },
            { el: document.getElementById("usuario"), empty: !user },
            { el: document.getElementById("contrasena"), empty: !pw },
          ];
          const invalid = checks.filter((f) => f.empty);
          if (invalid.length) {
            invalid.forEach(({ el }) => {
              el.style.borderColor = "#c0392b";
              el.style.animation = "shake 0.35s ease";
              setTimeout(() => {
                el.style.animation = "";
                el.style.borderColor = "";
              }, 400);
            });
            return;
          }
          const btn = document.getElementById("submitBtn");
          btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Verificando…`;
          btn.style.background = "var(--gold)";
          btn.disabled = true;
        });
    </script>
  </body>
</html>
